name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install && cd frontend && bun install

      - name: Type-check backend
        run: bun run lint

      - name: Type-check frontend
        run: cd frontend && npx tsc --noEmit

      - name: Run tests
        run: bun test
