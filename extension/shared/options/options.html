<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Trove — Settings</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      line-height: 1.5;
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #999;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 0.375rem;
    }

    input[type="text"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      border: 1px solid #e8e6e1;
      border-radius: 0.5rem;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #22c55e;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    button {
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 500;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
    }

    .btn-secondary {
      background: #e8e6e1;
      color: #1a1a1a;
    }

    .status {
      margin-top: 1rem;
      font-size: 0.8125rem;
      min-height: 1.25rem;
    }

    .status-success {
      color: #22c55e;
    }

    .status-error {
      color: #ef4444;
    }

    .status-loading {
      color: #999;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: #1c1b1a;
        color: #e8e6e1;
      }

      input[type="text"],
      input[type="password"] {
        background: #2a2826;
        border-color: #3a3836;
        color: #e8e6e1;
      }

      input:focus {
        border-color: #22c55e;
      }

      label {
        color: #999;
      }

      .subtitle {
        color: #777;
      }

      .btn-primary {
        background: #e8e6e1;
        color: #1a1a1a;
      }

      .btn-secondary {
        background: #2a2826;
        color: #e8e6e1;
      }

      .status-loading {
        color: #777;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Save to Trove — Settings</h1>
    <p class="subtitle">Connect this extension to your Trove instance.</p>

    <div class="field">
      <label for="serverUrl">Server URL</label>
      <input type="text" id="serverUrl" placeholder="https://trove.your-domain.com" autocomplete="url" spellcheck="false">
    </div>

    <div class="field">
      <label for="apiToken">API Token</label>
      <input type="password" id="apiToken" placeholder="Your Trove API token" autocomplete="off" spellcheck="false">
    </div>

    <div class="actions">
      <button id="saveBtn" class="btn-primary">Save</button>
      <button id="testBtn" class="btn-secondary">Test Connection</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="../lib/api.js"></script>
  <script src="options.js"></script>
</body>
</html>
